<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Banco Digital</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg,#0f172a,#1e293b);
            color: white;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            width: 300px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: none;
            border-radius: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: #4f46e5;
            color: white;
            cursor: pointer;
        }

            button:hover {
                background: #6366f1;
            }

        #dashboard {
            display: none;
            padding: 20px;
        }
    </style>

</head>
<body>

    <div id="login" class="container">
        <div class="card">

            <h2>Banco Digital</h2>

            <input id="dpiLogin" placeholder="DPI">
            <input id="passLogin" type="password" placeholder="Contraseña">

            <button onclick="login()">Ingresar</button>

            <hr>

            <h3>Registro</h3>

            <input id="nombre" placeholder="Nombre">
            <input id="dpiRegistro" placeholder="DPI">
            <input id="passRegistro" type="password" placeholder="Contraseña">

            <button onclick="registrar()">Registrarse</button>

        </div>
    </div>

    <div id="dashboard">

        <h2>Bienvenido</h2>

        <button onclick="logout()">Cerrar sesión</button>

        <h3>Saldo: Q<span id="saldo">0</span></h3>

        <h3>Depósito</h3>
        <input id="depositoMonto">
        <button onclick="depositar()">Depositar</button>

        <h3>Pago</h3>
        <input id="pagoMonto">
        <button onclick="pagar()">Pagar</button>

        <h3>Transferencia</h3>
        <input id="cuentaDestino">
        <input id="montoTransfer">
        <button onclick="transferir()">Transferir</button>

    </div>

    <script src="app.js"></script>

</body>
</html>
